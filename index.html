<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛马程序员 - 带你成为真正的牛马</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="/static/components/SiteHeader.js"></script>
</head>
<body class="home-page">
    <div id="app">
        <site-header></site-header>

        <main class="home-main">
            <section class="hero-section">
                <h1 class="hero-title" id="hero-title">学 IT 改命，先改掉熬夜不写注释的命</h1>
                <h2 class="hero-desc" id="hero-desc">一个专门收留打工人、半吊子站长和深夜技术幻想家的赛博据点</h2>
            </section>

            <section class="nav-grid" id="nav-grid">
                <div class="loading-indicator">加载导航数据中...</div>
            </section>
        </main>
    </div>

    <script>
        const heroOptions = [
            { title: '学 IT 改命，先改掉熬夜不写注释的命', desc: '一个专门收留打工人、半吊子站长和深夜技术幻想家的赛博据点' },
            { title: '只要需求提得够离谱，方案就会显得很有创造力', desc: '这里有学习笔记、摸鱼工具、项目急救和一些写着写着就破防的复盘' },
            { title: '不保证年薪百万，至少保证梗味纯正', desc: '从卷王指南到黑心云，把技术人的苦中作乐尽量写得像回事' }
        ];
        const hero = heroOptions[Math.floor(Math.random() * heroOptions.length)];
        document.getElementById('hero-title').textContent = hero.title;
        document.getElementById('hero-desc').textContent = hero.desc;

        (async function loadNav() {
            const grid = document.getElementById('nav-grid');
            try {
                const res = await fetch('/nav.xml');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const xmlText = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, 'text/xml');

                const groups = xml.querySelectorAll('group');
                grid.innerHTML = '';

                groups.forEach(function (group) {
                    const name = group.getAttribute('name');
                    const emoji = group.getAttribute('emoji') || '🔗';
                    const desc = group.getAttribute('desc') || '';

                    const card = document.createElement('div');
                    card.className = 'nav-group';

                    const header = document.createElement('div');
                    header.className = 'nav-group-header';
                    header.innerHTML = '<span class="nav-group-emoji">' + emoji + '</span>' +
                        '<h3 class="nav-group-title">' + name + '</h3>';
                    card.appendChild(header);

                    if (desc) {
                        const p = document.createElement('p');
                        p.className = 'nav-group-desc';
                        p.textContent = desc;
                        card.appendChild(p);
                    }

                    const links = document.createElement('div');
                    links.className = 'nav-group-links';
                    const items = group.querySelectorAll('item');
                    items.forEach(function (item) {
                        const a = document.createElement('a');
                        a.href = item.getAttribute('href');
                        a.textContent = item.textContent;
                        links.appendChild(a);
                    });
                    card.appendChild(links);

                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<div class="nav-error">导航数据加载失败，请刷新重试。' + e.message + '</div>';
            }
        })();
    </script>
</body>
</html>
