<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Babylon FPS Arena</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #07111f;
			--panel: rgba(8, 15, 28, 0.72);
			--text: #edf4ff;
			--muted: #9eb3d4;
			--accent: #7cf7d4;
			--danger: #ff6a6a;
			--warning: #ffd56a;
		}

		html, body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background:
				radial-gradient(circle at top, rgba(61, 110, 184, 0.45), transparent 40%),
				radial-gradient(circle at bottom, rgba(124, 247, 212, 0.12), transparent 35%),
				var(--bg);
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
		}

		#gameCanvas {
			width: 100%;
			height: 100%;
			display: block;
			touch-action: none;
			cursor: crosshair;
		}

		#hud {
			position: fixed;
			inset: 0;
			pointer-events: none;
			color: var(--text);
		}

		.panel {
			position: absolute;
			top: 16px;
			left: 16px;
			padding: 12px 14px;
			background: var(--panel);
			border: 1px solid rgba(124, 247, 212, 0.2);
			border-radius: 14px;
			backdrop-filter: blur(12px);
			box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
			min-width: 220px;
		}

		.panel h1 {
			margin: 0 0 8px;
			font-size: 18px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.row {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			font-size: 14px;
			line-height: 1.5;
			color: var(--muted);
		}

		.row strong {
			color: var(--text);
			font-weight: 700;
		}

		#centerHint {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
			padding: 16px 20px;
			background: rgba(5, 10, 18, 0.6);
			border: 1px solid rgba(124, 247, 212, 0.18);
			border-radius: 18px;
			color: var(--text);
			max-width: 360px;
			transition: opacity 0.2s ease, transform 0.2s ease;
		}

		#centerHint.hidden {
			opacity: 0;
			transform: translate(-50%, -50%) scale(0.98);
		}

		#crosshair {
			position: absolute;
			left: 50%;
			top: 50%;
			width: 18px;
			height: 18px;
			transform: translate(-50%, -50%);
			opacity: 0.9;
		}

		#crosshair::before,
		#crosshair::after {
			content: "";
			position: absolute;
			left: 50%;
			top: 50%;
			background: rgba(237, 244, 255, 0.9);
			box-shadow: 0 0 10px rgba(124, 247, 212, 0.7);
			transform: translate(-50%, -50%);
		}

		#crosshair::before {
			width: 18px;
			height: 2px;
		}

		#crosshair::after {
			width: 2px;
			height: 18px;
		}

		#status {
			position: absolute;
			right: 16px;
			top: 16px;
			padding: 12px 14px;
			border-radius: 14px;
			background: var(--panel);
			border: 1px solid rgba(124, 247, 212, 0.2);
			min-width: 180px;
			text-align: right;
		}

		#status .title {
			color: var(--accent);
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-size: 12px;
			margin-bottom: 6px;
		}

		#status .big {
			font-size: 26px;
			font-weight: 800;
			line-height: 1;
		}

		#message {
			position: absolute;
			left: 50%;
			bottom: 20px;
			transform: translateX(-50%);
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(7, 17, 31, 0.7);
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: var(--muted);
			font-size: 13px;
			letter-spacing: 0.02em;
		}

		#message strong { color: var(--text); }
	</style>
</head>
<body>
	<canvas id="gameCanvas"></canvas>
	<div id="hud">
		<div class="panel">
			<h1>Babylon FPS</h1>
			<div class="row"><span>生命</span><strong id="healthText">100</strong></div>
			<div class="row"><span>弹药</span><strong id="ammoText">30 / 30</strong></div>
			<div class="row"><span>击杀</span><strong id="scoreText">0</strong></div>
			<div class="row"><span>波次</span><strong id="waveText">1</strong></div>
		</div>

		<div id="status">
			<div class="title">目标</div>
			<div class="big" id="enemyCount">0</div>
		</div>

		<div id="centerHint">
			点击屏幕进入战场，使用 WASD 移动，鼠标瞄准，左键射击，R 装弹。
		</div>

		<div id="crosshair"></div>
		<div id="message">提示：优先击倒靠近你的敌人</div>
	</div>

	<script src="3dFPS-file/babylon.js"></script>
	<script src="3dFPS-file/babylon.gui.min.js"></script>
	<script src="3dFPS-file/babylonjs.loaders.min.js"></script>
	<script>
		(async () => {
			const canvas = document.getElementById("gameCanvas");
			const healthText = document.getElementById("healthText");
			const ammoText = document.getElementById("ammoText");
			const scoreText = document.getElementById("scoreText");
			const waveText = document.getElementById("waveText");
			const enemyCountText = document.getElementById("enemyCount");
			const centerHint = document.getElementById("centerHint");
			const message = document.getElementById("message");

			const engine = new BABYLON.Engine(canvas, true, {
				preserveDrawingBuffer: true,
				stencil: true,
			});

			const scene = new BABYLON.Scene(engine);
			scene.clearColor = new BABYLON.Color4(0.54, 0.8, 0.98, 1);
			scene.collisionsEnabled = true;
			scene.gravity = new BABYLON.Vector3(0, -0.4, 0);

			const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 1.7, -12), scene);
			camera.attachControl(canvas, true);
			camera.applyGravity = false;
			// 我们使用单独的不可见碰撞体处理碰撞移动，避免依赖 camera.moveWithCollisions()
			camera.checkCollisions = false;
			// Minecraft 移动速度约 0.1 方块/毫秒，调整为合理的游戏感觉
			camera.speed = 0.038;
			camera.angularSensibility = 850; // 略快一点，避免拖滞感
			// 更接近 Minecraft 玩家碰撞盒（宽、眼高、深）
			camera.ellipsoid = new BABYLON.Vector3(0.6, 1.62, 0.6);

			// 创建一个不可见的 player 碰撞体用于 moveWithCollisions
			const playerHeight = 1.8; // Minecraft 玩家高度 1.8 方块
			const player = BABYLON.MeshBuilder.CreateBox("playerCollider", { height: playerHeight, width: 0.6, depth: 0.6 }, scene);
			player.position = new BABYLON.Vector3(camera.position.x, playerHeight / 2, camera.position.z);
			player.checkCollisions = true;
			player.isVisible = false;
			// 添加碰撞边距以改善碰撞检测稳定性
			player.ellipsoid = new BABYLON.Vector3(0.3, 0.9, 0.3);
			const cameraEyeOffset = 1.62 - (playerHeight / 2);
			// 将相机初始位置同步到 player 的头部高度
			camera.position = new BABYLON.Vector3(player.position.x, player.position.y + cameraEyeOffset, player.position.z);
			camera.keysUp = [87];
			camera.keysDown = [83];
			camera.keysLeft = [65];
			camera.keysRight = [68];

			const light = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
			light.intensity = 1.0;
			light.diffuse = new BABYLON.Color3(0.92, 0.96, 1);
			light.groundColor = new BABYLON.Color3(0.38, 0.32, 0.22);

			const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.35, -0.9, 0.25), scene);
			sun.position = new BABYLON.Vector3(24, 32, -18);
			sun.diffuse = new BABYLON.Color3(1.0, 0.98, 0.86);
			sun.specular = new BABYLON.Color3(0.08, 0.08, 0.07);
			sun.intensity = 1.45;

			const shadowGenerator = new BABYLON.ShadowGenerator(1024, sun);
			// 方块风格使用较硬的阴影（减少模糊）并启用 Poisson 取样以获得更稳定的像素化阴影
			shadowGenerator.useBlurExponentialShadowMap = false;
			shadowGenerator.usePoissonSampling = true;
			shadowGenerator.blurKernel = 4;

			const arenaSize = 60;

			const skybox = BABYLON.MeshBuilder.CreateBox("skybox", { size: 400 }, scene);
			const skyboxMat = new BABYLON.StandardMaterial("skyboxMat", scene);
			skyboxMat.backFaceCulling = false;
			skyboxMat.disableLighting = true;
			skyboxMat.specularColor = BABYLON.Color3.Black();
			skyboxMat.diffuseColor = new BABYLON.Color3(0.56, 0.8, 0.98);
			skyboxMat.emissiveColor = new BABYLON.Color3(0.56, 0.8, 0.98);
			skybox.material = skyboxMat;
			skybox.infiniteDistance = true;
			skybox.isPickable = false;

			const floor = BABYLON.MeshBuilder.CreateGround("floor", { width: arenaSize, height: arenaSize, subdivisions: 2 }, scene);
			floor.checkCollisions = true;
			floor.receiveShadows = true;
			floor.isPickable = true;

			const floorMat = new BABYLON.StandardMaterial("floorMat", scene);
			const floorTexture = new BABYLON.DynamicTexture("floorTexture", { width: 1024, height: 1024 }, scene, false);
			const ctx = floorTexture.getContext();
			ctx.fillStyle = "#74b44a";
			ctx.fillRect(0, 0, 1024, 1024);
			const tileSize = 32;
			for (let gx = 0; gx < 32; gx++) {
				for (let gy = 0; gy < 32; gy++) {
					const x = gx * tileSize;
					const y = gy * tileSize;
					ctx.fillStyle = (gx + gy) % 2 === 0 ? "#78bb4d" : "#6eae46";
					ctx.fillRect(x, y, tileSize, tileSize);
					ctx.fillStyle = "rgba(150, 198, 95, 0.18)";
					ctx.fillRect(x + 3, y + 3, tileSize - 6, 6);
					ctx.fillStyle = "rgba(78, 114, 43, 0.2)";
					ctx.fillRect(x, y + tileSize - 5, tileSize, 5);
				}
			}
			ctx.strokeStyle = "rgba(69, 48, 24, 0.35)";
			ctx.lineWidth = 2;
			for (let i = 0; i <= 32; i++) {
				const p = tileSize * i;
				ctx.beginPath();
				ctx.moveTo(p, 0);
				ctx.lineTo(p, 1024);
				ctx.stroke();
				ctx.beginPath();
				ctx.moveTo(0, p);
				ctx.lineTo(1024, p);
				ctx.stroke();
			}
			ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
			for (let i = 0; i < 140; i++) {
				ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 3, 3);
			}
			floorTexture.update(false);
			floorTexture.uScale = 5;
			floorTexture.vScale = 5;
			floorMat.diffuseTexture = floorTexture;
			floorMat.specularColor = new BABYLON.Color3(0.02, 0.02, 0.02);
			floorMat.emissiveColor = new BABYLON.Color3(0.05, 0.08, 0.03);
			floor.material = floorMat;

			function makeWall(name, width, height, depth, x, y, z) {
				const wall = BABYLON.MeshBuilder.CreateBox(name, { width, height, depth }, scene);
				wall.position.set(x, y, z);
				wall.checkCollisions = true;
				wall.receiveShadows = true;
				const mat = new BABYLON.StandardMaterial(name + "Mat", scene);
				mat.diffuseColor = new BABYLON.Color3(0.08, 0.17, 0.23);
				mat.emissiveColor = new BABYLON.Color3(0.02, 0.04, 0.05);
				wall.material = mat;
				shadowGenerator.addShadowCaster(wall);
				return wall;
			}

			const boundary = 1.2;
			makeWall("north", arenaSize, 6, boundary, 0, 3, arenaSize / 2);
			makeWall("south", arenaSize, 6, boundary, 0, 3, -arenaSize / 2);
			makeWall("east", boundary, 6, arenaSize, arenaSize / 2, 3, 0);
			makeWall("west", boundary, 6, arenaSize, -arenaSize / 2, 3, 0);

			function addPillar(x, z, height = 4) {
				// 使用较方的柱子并启用平面着色以获得像素化效果
				const pillar = BABYLON.MeshBuilder.CreateCylinder("pillar", { height, diameter: 1.8, tessellation: 10 }, scene);
				pillar.position.set(x, height / 2, z);
				pillar.checkCollisions = true;
				const mat = new BABYLON.StandardMaterial("pillarMat", scene);
				mat.diffuseColor = new BABYLON.Color3(0.12, 0.22, 0.28);
				mat.specularColor = new BABYLON.Color3(0, 0, 0);
				mat.emissiveColor = new BABYLON.Color3(0.03, 0.05, 0.06);
				pillar.material = mat;
				if (pillar.convertToFlatShadedMesh) pillar.convertToFlatShadedMesh();
				shadowGenerator.addShadowCaster(pillar);
				return pillar;
			}

			[
				[-12, -8], [12, -8], [-12, 8], [12, 8], [0, 0], [-5, 15], [5, -15]
			].forEach(([x, z]) => addPillar(x, z));

			for (let i = 0; i < 10; i++) {
				const box = BABYLON.MeshBuilder.CreateBox(`crate-${i}`, {
					width: 2 + Math.random() * 2,
					height: 1.4 + Math.random() * 1.2,
					depth: 1.8 + Math.random() * 2,
				}, scene);
				box.position.set((Math.random() - 0.5) * 42, 0, (Math.random() - 0.5) * 42);
				box.position.y = box.getBoundingInfo().boundingBox.extendSize.y;
				box.checkCollisions = true;
				const mat = new BABYLON.StandardMaterial(`crateMat-${i}`, scene);
				mat.diffuseColor = new BABYLON.Color3(0.35 + Math.random() * 0.15, 0.2 + Math.random() * 0.1, 0.1 + Math.random() * 0.07);
				mat.specularColor = new BABYLON.Color3(0, 0, 0);
				box.material = mat;
				if (box.convertToFlatShadedMesh) box.convertToFlatShadedMesh();
				shadowGenerator.addShadowCaster(box);
			}

			const weapon = new BABYLON.TransformNode("weapon", scene);
			weapon.parent = camera;
			// 调整武器位置使其可见：右下前方（相对于相机）
			weapon.position.set(0.25, -0.25, 0.5);
			weapon.rotation.set(0.02, Math.PI, 0);

			const weaponBase = BABYLON.MeshBuilder.CreateBox("weaponBase", { width: 0.34, height: 0.16, depth: 0.42 }, scene);
			weaponBase.parent = weapon;
			weaponBase.position.set(0, 0, 0);
			weaponBase.isPickable = false;
			const weaponMat = new BABYLON.StandardMaterial("weaponMat", scene);
			weaponMat.diffuseColor = new BABYLON.Color3(0.14, 0.16, 0.2);
			weaponMat.emissiveColor = new BABYLON.Color3(0.03, 0.04, 0.05);
			weaponBase.material = weaponMat;
			shadowGenerator.addShadowCaster(weaponBase);

			// 方块化枪管：使用长方体代替圆柱
			const weaponBarrel = BABYLON.MeshBuilder.CreateBox("weaponBarrel", { width: 0.08, height: 0.08, depth: 0.44 }, scene);
			weaponBarrel.parent = weapon;
			weaponBarrel.position.set(0.02, 0.02, 0.28);
			const weaponBarrelMat = new BABYLON.StandardMaterial("weaponBarrelMat", scene);
			weaponBarrelMat.diffuseColor = new BABYLON.Color3(0.08, 0.09, 0.11);
			weaponBarrelMat.specularColor = new BABYLON.Color3(0, 0, 0);
			weaponBarrel.material = weaponBarrelMat;
			if (weaponBarrel.convertToFlatShadedMesh) weaponBarrel.convertToFlatShadedMesh();
			shadowGenerator.addShadowCaster(weaponBarrel);

			const weaponGrip = BABYLON.MeshBuilder.CreateBox("weaponGrip", { width: 0.1, height: 0.22, depth: 0.16 }, scene);
			weaponGrip.parent = weapon;
			weaponGrip.position.set(-0.06, -0.16, -0.02);
			weaponGrip.rotation.z = -0.45;
			const weaponGripMat = new BABYLON.StandardMaterial("weaponGripMat", scene);
			weaponGripMat.diffuseColor = new BABYLON.Color3(0.11, 0.12, 0.14);
			weaponGripMat.emissiveColor = new BABYLON.Color3(0.02, 0.02, 0.03);
			weaponGrip.material = weaponGripMat;
			shadowGenerator.addShadowCaster(weaponGrip);

			const weaponSight = BABYLON.MeshBuilder.CreateBox("weaponSight", { width: 0.1, height: 0.06, depth: 0.08 }, scene);
			weaponSight.parent = weapon;
			weaponSight.position.set(0.02, 0.12, 0.02);
			const weaponSightMat = new BABYLON.StandardMaterial("weaponSightMat", scene);
			weaponSightMat.diffuseColor = new BABYLON.Color3(0.12, 0.12, 0.13);
			weaponSightMat.emissiveColor = new BABYLON.Color3(0.02, 0.02, 0.03);
			weaponSight.material = weaponSightMat;
			shadowGenerator.addShadowCaster(weaponSight);

			// 方形炮口
			const muzzle = BABYLON.MeshBuilder.CreateBox("muzzle", { width: 0.06, height: 0.06, depth: 0.06 }, scene);
			muzzle.parent = weapon;
			muzzle.position.set(0, 0, 0.54);
			muzzle.isPickable = false;
			const muzzleMat = new BABYLON.StandardMaterial("muzzleMat", scene);
			muzzleMat.emissiveColor = new BABYLON.Color3(1, 0.8, 0.3);
			muzzleMat.alpha = 0;
			muzzle.material = muzzleMat;

			let enemyTemplate = null;
			let weaponTemplate = null;
			const fallbackWeaponParts = [weaponBase, weaponBarrel, weaponGrip, weaponSight];
			// 转为平面着色以获得方块化视觉
			fallbackWeaponParts.forEach((part) => {
				if (part && part.convertToFlatShadedMesh) part.convertToFlatShadedMesh();
			});

			const sparkTexture = new BABYLON.DynamicTexture("sparkTexture", { width: 64, height: 64 }, scene, false);
			const sparkCtx = sparkTexture.getContext();
			const sparkGradient = sparkCtx.createRadialGradient(32, 32, 2, 32, 32, 28);
			sparkGradient.addColorStop(0, "rgba(255,255,255,1)");
			sparkGradient.addColorStop(0.25, "rgba(255,236,160,0.95)");
			sparkGradient.addColorStop(0.6, "rgba(124,247,212,0.55)");
			sparkGradient.addColorStop(1, "rgba(255,255,255,0)");
			sparkCtx.fillStyle = sparkGradient;
			sparkCtx.fillRect(0, 0, 64, 64);
			sparkTexture.update(false);

			const uiTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("ui");
			const damageText = new BABYLON.GUI.TextBlock();
			damageText.text = "";
			damageText.color = "#ffffff";
			damageText.fontSize = 42;
			damageText.alpha = 0;
			damageText.outlineColor = "#000000";
			damageText.outlineWidth = 4;
			uiTexture.addControl(damageText);

			const hitMarker = new BABYLON.GUI.Ellipse();
			hitMarker.width = "10px";
			hitMarker.height = "10px";
			hitMarker.thickness = 2;
			hitMarker.color = "#7cf7d4";
			hitMarker.alpha = 0;
			uiTexture.addControl(hitMarker);

			const weaponBob = { time: 0, recoil: 0 };
			const input = { reloading: false };
			const moveState = { forward: false, back: false, left: false, right: false };
			let jumpVelocity = 0;
			let grounded = true;
			const floorLevel = playerHeight / 2;

			let health = 100;
			let ammo = 30;
			let reserve = 90;
			let score = 0;
			let wave = 1;
			let paused = false;
			const enemies = [];

			function updateHUD() {
				healthText.textContent = Math.max(0, Math.round(health));
				ammoText.textContent = `${ammo} / ${reserve}`;
				scoreText.textContent = score;
				waveText.textContent = wave;
				enemyCountText.textContent = enemies.filter((e) => e.alive).length;
			}

			function showMessage(text, color = "var(--muted)") {
				message.textContent = text;
				message.style.color = color;
				clearTimeout(showMessage.timer);
				showMessage.timer = setTimeout(() => {
					message.textContent = "提示：优先击倒靠近你的敌人";
					message.style.color = "var(--muted)";
				}, 1800);
			}

			const audio = (() => {
				let context = null;
				const ensure = () => {
					if (!context) {
						context = new (window.AudioContext || window.webkitAudioContext)();
					}
					if (context.state === "suspended") {
						context.resume();
					}
					return context;
				};
				const pulse = (freq, type, duration, gainValue) => {
					const ctx = ensure();
					const osc = ctx.createOscillator();
					const gain = ctx.createGain();
					osc.type = type;
					osc.frequency.value = freq;
					gain.gain.value = gainValue;
					osc.connect(gain);
					gain.connect(ctx.destination);
					const now = ctx.currentTime;
					gain.gain.setValueAtTime(gainValue, now);
					gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
					osc.start(now);
					osc.stop(now + duration);
				};
				return {
					init() { ensure(); },
					shoot() { pulse(180, "square", 0.08, 0.06); },
					hit() { pulse(520, "triangle", 0.11, 0.05); },
					reload() { pulse(120, "sine", 0.18, 0.045); },
					damage() { pulse(72, "sawtooth", 0.12, 0.05); },
				};
			})();

			function flashHitMarker() {
				hitMarker.alpha = 1;
				setTimeout(() => { hitMarker.alpha = 0; }, 80);
			}

			function flashDamage(value, color = "#ff6a6a") {
				damageText.text = `-${value}`;
				damageText.color = color;
				damageText.alpha = 1;
				setTimeout(() => { damageText.alpha = 0; }, 200);
			}

			function createShotTracer(start, end, color = new BABYLON.Color3(0.49, 0.97, 0.83)) {
				const tracer = BABYLON.MeshBuilder.CreateLines("shotTracer", { points: [start, end] }, scene);
				tracer.color = color;
				setTimeout(() => tracer.dispose(), 45);
			}

			function createHitSparks(position) {
				const emitter = BABYLON.MeshBuilder.CreateBox("sparkEmitter", { size: 0.01 }, scene);
				emitter.isVisible = false;
				emitter.position.copyFrom(position);

				const sparks = new BABYLON.ParticleSystem("sparks", 28, scene);
				sparks.particleTexture = sparkTexture;
				sparks.emitter = emitter;
				sparks.minEmitBox = new BABYLON.Vector3(0, 0, 0);
				sparks.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
				sparks.color1 = new BABYLON.Color4(1, 0.98, 0.75, 1);
				sparks.color2 = new BABYLON.Color4(0.49, 0.97, 0.83, 1);
				sparks.colorDead = new BABYLON.Color4(0.2, 0.2, 0.2, 0);
				sparks.minSize = 0.06;
				sparks.maxSize = 0.16;
				sparks.minLifeTime = 0.06;
				sparks.maxLifeTime = 0.22;
				sparks.emitRate = 900;
				sparks.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
				sparks.gravity = new BABYLON.Vector3(0, -0.3, 0);
				sparks.direction1 = new BABYLON.Vector3(-1, -0.2, -1);
				sparks.direction2 = new BABYLON.Vector3(1, 0.6, 1);
				sparks.minAngularSpeed = 0;
				sparks.maxAngularSpeed = Math.PI;
				sparks.minEmitPower = 1.2;
				sparks.maxEmitPower = 4.2;
				sparks.updateSpeed = 0.015;
				sparks.start();

				setTimeout(() => {
					sparks.stop();
					sparks.dispose();
					emitter.dispose();
				}, 120);
			}

			function pickEnemyTarget(maxDistance = 120) {
				const ray = new BABYLON.Ray(camera.position.clone(), camera.getForwardRay().direction, maxDistance);
				const hit = scene.pickWithRay(ray, (mesh) => mesh && mesh.metadata && mesh.metadata.kind === "enemy");
				if (!hit || !hit.hit || !hit.pickedMesh) return null;

				// 如果点中了子部件，向上查找父节点，直到找到登记在 enemies 列表中的根 collider
				let picked = hit.pickedMesh;
				while (picked) {
					const found = enemies.find((item) => item.alive && item.mesh === picked);
					if (found) {
						return {
							enemy: found,
							position: hit.pickedPoint ? hit.pickedPoint.clone() : picked.getAbsolutePosition().clone(),
						};
					}
					picked = picked.parent;
				}
				return null;
			}

			async function loadObjAssets() {
				try {
					const [enemyResult, weaponResult] = await Promise.all([
						BABYLON.SceneLoader.ImportMeshAsync("", "3dFPS-file/model/", "enemy.obj", scene),
						BABYLON.SceneLoader.ImportMeshAsync("", "3dFPS-file/model/", "knock.obj", scene),
					]);

					enemyTemplate = enemyResult.meshes.find((mesh) => mesh instanceof BABYLON.Mesh) || enemyResult.meshes[0];
					if (enemyTemplate) {
						enemyTemplate.setEnabled(false);
						enemyTemplate.isVisible = false;
						enemyTemplate.metadata = { kind: "enemyTemplate" };
						enemyTemplate.scaling.setAll(1.15);
						const enemyMaterial = new BABYLON.StandardMaterial("enemyObjMat", scene);
						enemyMaterial.diffuseColor = new BABYLON.Color3(0.42, 0.78, 0.34);
						enemyMaterial.specularColor = new BABYLON.Color3(0, 0, 0);
						enemyTemplate.material = enemyMaterial;
						if (enemyTemplate.convertToFlatShadedMesh) enemyTemplate.convertToFlatShadedMesh();
					}

					weaponTemplate = weaponResult.meshes.find((mesh) => mesh instanceof BABYLON.Mesh) || weaponResult.meshes[0];
					if (weaponTemplate) {
						weaponTemplate.parent = weapon;
						weaponTemplate.position.set(0, 0, 0);
						weaponTemplate.rotation.set(0, Math.PI, 0);
						weaponTemplate.scaling.setAll(1.6);
						weaponTemplate.metadata = { kind: "weaponObj" };
						const weaponMaterial = new BABYLON.StandardMaterial("weaponObjMat", scene);
						weaponMaterial.diffuseColor = new BABYLON.Color3(0.34, 0.24, 0.12);
						weaponMaterial.specularColor = new BABYLON.Color3(0, 0, 0);
						weaponTemplate.material = weaponMaterial;
						if (weaponTemplate.convertToFlatShadedMesh) weaponTemplate.convertToFlatShadedMesh();
						fallbackWeaponParts.forEach((part) => part.setEnabled(false));
					}
				} catch (error) {
					console.warn("OBJ models failed to load, using fallback meshes.", error);
				}
			}

			function randomSpawnPosition() {
				let x = 0;
				let z = 0;
				for (let attempts = 0; attempts < 20; attempts++) {
					x = (Math.random() - 0.5) * 46;
					z = (Math.random() - 0.5) * 46;
					const distance = BABYLON.Vector3.Distance(new BABYLON.Vector3(x, 0, z), camera.position);
					if (distance > 14) break;
				}
				return new BABYLON.Vector3(x, 0, z);
			}

			function createEnemy(index) {
				let body;
				if (enemyTemplate) {
					body = enemyTemplate.clone(`enemy-${index}`, null, true);
					body.setEnabled(true);
					body.isVisible = true;
					body.position = randomSpawnPosition();
					body.position.y = 0;
					body.rotation.y = Math.random() * Math.PI * 2;
					body.checkCollisions = true;
					body.isPickable = true;
					body.metadata = { kind: "enemy" };
					const mat = new BABYLON.StandardMaterial(`enemyMat-${index}`, scene);
					mat.diffuseColor = new BABYLON.Color3(0.42 + Math.random() * 0.06, 0.74 + Math.random() * 0.1, 0.34 + Math.random() * 0.05);
					mat.specularColor = new BABYLON.Color3(0, 0, 0);
					body.material = mat;
					if (body.convertToFlatShadedMesh) body.convertToFlatShadedMesh();
					shadowGenerator.addShadowCaster(body);
				} else {
					// 使用多个立方体组成的方块化敌人（根节点为 collider，用于移动/碰撞）
					const collider = BABYLON.MeshBuilder.CreateBox(`enemy-collider-${index}`, { height: 1.8, width: 0.6, depth: 0.5 }, scene);
					collider.position = randomSpawnPosition();
					collider.position.y = 0.9;
					collider.checkCollisions = true;
					collider.isPickable = false; // 隐藏碰撞器本身

					// 头部
					const head = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-head`, { size: 0.6 }, scene);
					head.parent = collider;
					head.position.set(0, 0.55, 0);
					// 身体
					const torso = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-torso`, { width: 0.6, height: 0.9, depth: 0.4 }, scene);
					torso.parent = collider;
					torso.position.set(0, -0.05, 0);
					// 手臂
					const leftArm = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-larm`, { width: 0.18, height: 0.6, depth: 0.18 }, scene);
					leftArm.parent = collider;
					leftArm.position.set(-0.46, 0.0, 0);
					const rightArm = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-rarm`, { width: 0.18, height: 0.6, depth: 0.18 }, scene);
					rightArm.parent = collider;
					rightArm.position.set(0.46, 0.0, 0);
					// 腿
					const leftLeg = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-lleg`, { width: 0.2, height: 0.8, depth: 0.18 }, scene);
					leftLeg.parent = collider;
					leftLeg.position.set(-0.16, -0.95, 0);
					const rightLeg = BABYLON.MeshBuilder.CreateBox(`enemy-${index}-rleg`, { width: 0.2, height: 0.8, depth: 0.18 }, scene);
					rightLeg.parent = collider;
					rightLeg.position.set(0.16, -0.95, 0);

					// 赋予材质并启用平面着色
					[head, torso, leftArm, rightArm, leftLeg, rightLeg].forEach((m) => {
						m.isPickable = true;
						m.metadata = { kind: "enemy" };
						const mat = new BABYLON.StandardMaterial(`${m.name}-mat`, scene);
						mat.diffuseColor = new BABYLON.Color3(0.42 + Math.random() * 0.06, 0.74 + Math.random() * 0.1, 0.34 + Math.random() * 0.05);
						mat.specularColor = new BABYLON.Color3(0, 0, 0);
						m.material = mat;
						if (m.convertToFlatShadedMesh) m.convertToFlatShadedMesh();
						shadowGenerator.addShadowCaster(m);
					});

					body = collider;
				}

				const healthBar = new BABYLON.GUI.Rectangle(`enemyHealthBar-${index}`);
				healthBar.width = "90px";
				healthBar.height = "10px";
				healthBar.cornerRadius = 4;
				healthBar.thickness = 1;
				healthBar.color = "rgba(255,255,255,0.35)";
				healthBar.background = "rgba(0,0,0,0.55)";

				const healthFill = new BABYLON.GUI.Rectangle(`enemyHealthFill-${index}`);
				healthFill.width = "100%";
				healthFill.height = 1;
				healthFill.thickness = 0;
				healthFill.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
				healthFill.background = "#7cf7d4";
				healthBar.addControl(healthFill);

				// 先将 control 添加到根级 UI，再链接到 mesh（linkWithMesh 要求 control 在根级）
				uiTexture.addControl(healthBar);
				healthBar.linkOffsetY = -55;
				healthBar.linkWithMesh(body);

				return {
					mesh: body,
					hp: 3,
					maxHp: 3,
					speed: 0.015 + Math.random() * 0.008,
					alive: true,
					hitCooldown: 0,
					healthBar,
					healthFill,
				};
			}

			function spawnWave() {
				// Minecraft 风格波次生成：每波增加 2-3 个敌人
				const count = Math.max(2, 3 + Math.floor(wave * 1.5));
				for (let i = 0; i < count; i++) {
					enemies.push(createEnemy(enemies.length + 1));
				}
				showMessage(`第 ${wave} 波来袭`, "var(--warning)");
			}

			function muzzleFlash() {
				muzzleMat.alpha = 1;
				weapon.scaling.set(1.04, 1.04, 1.14);
				weaponBob.recoil = 0.12;
				setTimeout(() => {
					muzzleMat.alpha = 0;
					weapon.scaling.set(1, 1, 1);
				}, 40);
			}

			function shoot() {
				if (paused) return;
				if (ammo <= 0) {
					showMessage("弹药不足，按 R 装弹", "var(--warning)");
					audio.reload();
					return;
				}
				ammo -= 1;
				audio.shoot();
				muzzleFlash();
				flashHitMarker();

				const target = pickEnemyTarget();
				const muzzleWorld = muzzle.getAbsolutePosition();
				const tracerEnd = target
					? target.position
					: camera.position.add(camera.getForwardRay().direction.scale(42));
				createShotTracer(muzzleWorld, tracerEnd);

				if (target) {
					target.enemy.hp -= 1;
					audio.hit();
					flashDamage(1, "#7cf7d4");
					createHitSparks(target.position);
					target.enemy.healthFill.width = `${Math.max(0, target.enemy.hp / target.enemy.maxHp) * 100}%`;
					if (target.enemy.hp <= 0) {
						target.enemy.alive = false;
						target.enemy.healthBar.dispose();
						target.enemy.mesh.dispose();
						score += 1;
						showMessage("敌人已击倒", "var(--accent)");
					}
				} else {
					createHitSparks(tracerEnd);
				}

				if (ammo === 0) {
					showMessage("弹匣已空，按 R 装弹", "var(--warning)");
				}
				updateHUD();
			}

			function reload() {
				if (input.reloading || ammo === 30 || reserve <= 0 || paused) return;
				input.reloading = true;
				showMessage("正在装弹...", "var(--muted)");
				audio.reload();
				setTimeout(() => {
					const need = 30 - ammo;
					const take = Math.min(need, reserve);
					ammo += take;
					reserve -= take;
					input.reloading = false;
					updateHUD();
					showMessage("装弹完成", "var(--accent)");
				}, 700);
			}

			function takeDamage(amount) {
				health -= amount;
				audio.damage();
				flashDamage(amount);
				if (health <= 0) {
					health = 0;
					paused = true;
					camera.detachControl();
					centerHint.classList.remove("hidden");
					centerHint.innerHTML = "<strong>任务失败</strong><br>刷新页面重新开始。";
					showMessage("你被击倒了", "var(--danger)");
				}
				updateHUD();
			}

			function maybeNextWave() {
				if (enemies.every((e) => !e.alive)) {
					wave += 1;
					spawnWave();
					updateHUD();
				}
			}

			function setupInput() {
				canvas.addEventListener("click", async (event) => {
					if (paused) return;
					if (event.button === 0) {
						shoot();
					}
					if (document.pointerLockElement !== canvas) {
						canvas.requestPointerLock();
						centerHint.classList.add("hidden");
						audio.init();
					}
				});

				document.addEventListener("pointerlockchange", () => {
					const locked = document.pointerLockElement === canvas;
					if (!locked && !paused) {
						centerHint.classList.remove("hidden");
						centerHint.innerHTML = "点击屏幕进入战场，使用 WASD 移动，鼠标瞄准，左键射击，R 装弹。";
					}
				});

				window.addEventListener("keydown", (event) => {
					if (event.code === "KeyW") moveState.forward = true;
					if (event.code === "KeyS") moveState.back = true;
					if (event.code === "KeyA") moveState.left = true;
					if (event.code === "KeyD") moveState.right = true;
					if (event.code === "KeyR") {
						reload();
					}
					if (event.code === "Space" && grounded && !paused) {
						jumpVelocity = 0.42;
						grounded = false;
					}
					if (event.code === "Escape" && !paused) {
						centerHint.classList.remove("hidden");
					}
				});

				window.addEventListener("keyup", (event) => {
					if (event.code === "KeyW") moveState.forward = false;
					if (event.code === "KeyS") moveState.back = false;
					if (event.code === "KeyA") moveState.left = false;
					if (event.code === "KeyD") moveState.right = false;
				});

				window.addEventListener("mousedown", (event) => {
					if (event.button === 0 && document.pointerLockElement === canvas && !paused) {
						shoot();
					}
				});
			}

			setupInput();
			updateHUD();
			await loadObjAssets();
			
			// 初始化：确保 player 立即与地面碰撞（大幅下落以确保到达地面）
			player.moveWithCollisions(new BABYLON.Vector3(0, -10, 0));
			if (player.position.y < floorLevel) {
				player.position.y = floorLevel;
			}
			// 同步相机到 player 最终位置
			camera.position.x = player.position.x;
			camera.position.y = player.position.y + cameraEyeOffset;
			camera.position.z = player.position.z;
			
			spawnWave();

			scene.onBeforeRenderObservable.add(() => {
				if (paused) return;
				const dt = engine.getDeltaTime() / 16.666;
				// 保持 eye 高一致
				camera.ellipsoid.y = 1.62;

				const moveVector = new BABYLON.Vector3(
					(moveState.right ? 1 : 0) - (moveState.left ? 1 : 0),
					0,
					(moveState.forward ? 1 : 0) - (moveState.back ? 1 : 0),
				);

				// 计算水平移动（在水平面投影）
				let horiz = new BABYLON.Vector3(0, 0, 0);
				if (moveVector.lengthSquared() > 0) {
					moveVector.normalize();
					let forward = camera.getDirection(BABYLON.Axis.Z);
					forward.y = 0;
					forward.normalize();
					let right = camera.getDirection(BABYLON.Axis.X);
					right.y = 0;
					right.normalize();
					horiz = forward.scale(moveVector.z).add(right.scale(moveVector.x)).scale(camera.speed * dt);
					// 限制水平移动距离以防止穿模
					const horizLen = horiz.length();
					if (horizLen > 0.22) {
						horiz.scaleInPlace(0.22 / horizLen);
					}
				}

				jumpVelocity -= 0.07 * dt;
				const vertical = new BABYLON.Vector3(0, jumpVelocity * dt, 0);
				if (vertical.y < -0.3) vertical.y = -0.3;
				if (vertical.y > 0.24) vertical.y = 0.24;

				// 分离碰撞移动：先水平后垂直（更稳定）
				if (horiz.lengthSquared() > 0) {
					player.moveWithCollisions(horiz);
				}
				if (vertical.lengthSquared() > 0) {
					player.moveWithCollisions(vertical);
				}
				// 同步相机到 player 上方（眼高偏移）
				camera.position.x = player.position.x;
				camera.position.z = player.position.z;
				camera.position.y = player.position.y + cameraEyeOffset;

				if (player.position.y <= floorLevel + 0.001) {
					player.position.y = floorLevel;
					camera.position.y = player.position.y + cameraEyeOffset;
					jumpVelocity = 0;
					grounded = true;
				} else {
					grounded = false;
				}
				weaponBob.time += engine.getDeltaTime() * 0.01;
				const bobX = Math.sin(weaponBob.time * 1.8) * 0.015;
				const bobY = Math.abs(Math.cos(weaponBob.time * 1.8)) * 0.02;
				weapon.position.x = 0.34 + bobX;
				weapon.position.y = -0.32 - bobY;
				weapon.rotation.z = -0.02 + Math.sin(weaponBob.time * 2.8) * 0.01;
				weapon.position.z = 0.75 - weaponBob.recoil;
				weaponBob.recoil = Math.max(0, weaponBob.recoil - 0.02 * dt);

				enemies.forEach((enemy) => {
					if (!enemy.alive) return;
					const delta = camera.position.subtract(enemy.mesh.position);
					const distance = delta.length();
					const direction = distance > 0.001 ? delta.scale(1 / distance) : BABYLON.Vector3.Zero();
					enemy.mesh.lookAt(camera.position);
					// 限制敌人每帧移动距离防止卡住
					let moveDir = direction.scale(enemy.speed * dt);
					const moveLen = moveDir.length();
					if (moveLen > 0.08) {
						moveDir.scaleInPlace(0.08 / moveLen);
					}
					if (moveLen > 0.001) {
						enemy.mesh.moveWithCollisions(moveDir);
					}
					enemy.healthBar.linkOffsetY = -55;

					if (distance < 1.8) {
						enemy.hitCooldown -= engine.getDeltaTime();
						if (enemy.hitCooldown <= 0) {
							enemy.hitCooldown = 650;
							takeDamage(8 + Math.round(wave * 0.8));
						}
					}
				});

				maybeNextWave();
				updateHUD();
			});

			engine.runRenderLoop(() => {
				scene.render();
			});

			window.addEventListener("resize", () => engine.resize());

			showMessage("点击屏幕开始", "var(--accent)");
		})();
	</script>
</body>
</html>
