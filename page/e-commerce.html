# 破产电商（电商复盘与运营支持）

名字是自嘲，内容尽量务实。这里整理电商项目里真正花过钱、踩过坑之后留下的经验，少讲神话，多讲复盘。

## 能帮上的部分

- 店铺与站点基础梳理：商品、活动、订单、支付、履约链路一起看。
- 活动复盘：大促准备、库存协同、页面承接和转化观察。
- 数据整理：把分散数据收成能看、能追、能复盘的看板。
- 技术配合：促销、搜索、支付、消息通知等常见链路的对接与优化。

## 更适合什么团队

- 正在从“能卖”走向“卖得稳”的小团队
- 需要技术和运营一起对齐的项目
- 不想再靠拍脑袋决定活动节奏的店铺

## 合作期望

- 先找出最影响转化或成本的 1 到 2 个问题
- 小步快跑，边做边复盘
- 少讲术语，多看数据和实际反馈

如需聊具体场景，可以先看看[关于牛马](about.html)。
