# 摸鱼日记（Blog）

这里放一些短笔记和正在整理的话题，主打一个不端着，也不拿占位符糊弄人。

## 最近在记

- **把工具先做小，再谈做大**：真正高频的工具，往往是不登录、不跳转、打开就能用的那种。
- **老项目急救的第一步不是重构**：先盘清入口、日志、依赖和回滚路径，比一上来大改更有效。
- **内容运营别先想着爆款**：先把账号定位、更新频率和转化目标说明白，再去谈增长。
- **做外包最怕“什么都能做”**：边界越模糊，返工越多，合作越累。

## 在路上

- 一批开发小工具的使用说明
- 电商项目的复盘笔记
- AI 辅助写代码的实战记录

内容会慢慢补，但尽量每一条都能落地。
