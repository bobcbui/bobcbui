# 牛马法宝（生产力工具）

真正的好工具不一定高级，但一定能在你快崩的时候少补一刀。这里放一批打工人高频乱用的小玩意。

## 常用工具

- [Base64 编解码](/tools/base64.html)
- [JSON 格式化与清理](/tools/json.html)
- [Cron 表达式计算](/tools/corn.html)
- [日期分析](/tools/date.html)
- [时间工具](/tools/time.html)

## 还能做什么

- **需求拆解**：把“我想做个类似某某的东西”翻译成人类能执行的任务清单。
- **小型开发**：内部工具、管理后台、落地页，什么不大不小就最爱找上门。
- **老项目止痛**：先别谈信仰，先补日志、补文档、补一口阳气。

## 做事方式

1. 先问清楚到底要什么，避免做了半天发现大家想的不是一个玩意。
2. 先搞出能跑的，再慢慢把它包装得像经过深思熟虑。
3. 该留的文档和说明还是留，免得下一个接手的人当场破防。
4. 能少折腾用户一点，就少给互联网增加一点心理阴影。
    </script>
