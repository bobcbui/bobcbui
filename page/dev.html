## 还能做什么

- **需求拆解**：把模糊需求拆成能排期、能实现、能验收的任务。
- **小型开发**：内部工具、管理后台、落地页和脚本类需求。
- **老项目止痛**：先补文档、补日志、补边界，再考虑怎么慢慢还债。

## 做事方式

1. 先确认目标和边界，不拿“都可以”当方案。
2. 先做最小可用版本，再补体验和细节。
3. 重要链路留文档、留说明、留回滚余地。
4. 能少折腾用户和接手的人，就少折腾一点。
