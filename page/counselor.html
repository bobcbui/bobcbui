# ICU 防丢指南（技术急救台）

给线上故障、老系统和临时接手项目做一次止血处理。先把系统稳住，再决定是重构、补文档，还是继续迭代。

## 常见服务

- **代码体检**：梳理核心链路、依赖关系、风险点和历史包袱。
- **事故止血**：排查报错、补日志、补监控、补回滚方案，让问题先别继续扩大。
- **选型对焦**：在预算、人力和上线周期里做务实判断，不拿术语压人。
- **交接兜底**：帮新同事看懂旧项目，减少“上一任已经失联”的痛苦。

## 交付方式

- 问题清单和优先级建议
- 一份能执行的改造路线图
- 必要时配套文档、会议纪要和短期跟进
