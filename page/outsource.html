# 在线卖身

名字虽然不体面，服务态度还是尽量体面。适合短期补位、赶节点、接手半成品，和那些大家嘴上说简单但谁都不想做的活。

## 合作模式

- **短期补位**：哪块缺人补哪块，像技术创可贴一样先贴上去。
- **原型落地**：先把脑内 PPT 变成一个能点、能看、能糊弄甲方的版本。
- **老项目接手**：先判断这是修修补补还能活，还是已经建议准备后事。

## 适合的活

- 管理后台、工具页、落地页、自动化脚本
- 小型内容站、运营支持页、数据整理这类看着不酷但特别费人的活
- 需要文档补全和交接说明的临时项目，不让后来的人边接边骂

## 合作原则

- 边界说清楚，免得做到一半突然发现需求自己长腿了。
- 能交付可维护的东西，就尽量别留下赛博地雷。
- 不吹全能，但接了的活尽量不装死。
