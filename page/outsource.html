# 在线卖身（外包服务）

名字是段子，合作要认真。适合短期补位、赶节点、接手半成品和处理别人不想碰的杂活。

## 合作模式

- **短期补位**：需求明确、周期可控的小项目或小模块。
- **原型落地**：把脑子里的想法尽快做成能演示、能验证的版本。
- **老项目接手**：先盘清现状，再决定修、补还是重做。

## 适合的活

- 管理后台、工具页、落地页、自动化脚本
- 小型内容站、运营支持页面、数据整理类需求
- 需要文档补全和交接说明的临时项目

## 合作原则

- 边界说清楚，进度说人话，风险提前讲。
- 能交付可维护的东西，就不只交一坨能跑的代码。
- 不吹全能，只接能负责到底的部分。
