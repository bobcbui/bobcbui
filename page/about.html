# 关于黑厂（牛马程序员保护协会）

这里是一个供年轻人们互相抱团取暖、交流脱发经验的技术避难所。我们不生产优秀代码，只做 Bug 的搬运工。

## 第一原则

- 让天下没有难甩的锅：只要跑得够快，线上事故就追不上你。

## 厂训

- 哪怕天天写 `if-else`，也要包装成基于 AST 的智能条件分支路由系统。
- 只要老板开上迈巴赫，我们就觉得多掉几根头发是值得的（并没有）。
- 周末休息是不可能休息的，只有重构和开会，才能维持生命的跳动。

欢迎加入我们，共同抵御 35 岁被优化的达摩克利斯之剑。
