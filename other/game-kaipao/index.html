<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>向妖兽开炮</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%;height:100%;overflow:hidden;background:#0a0a1a;color:#e8e8f0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation; }
#gameCanvas { position:fixed;inset:0;display:block;touch-action:none; }
.ui-layer { position:fixed;inset:0;pointer-events:none;z-index:5; }

/* HUD - top-left */
#hud { position:absolute;top:8px;left:8px;padding:8px 12px;background:rgba(10,10,26,0.8);border:1px solid rgba(100,100,180,0.2);border-radius:10px;min-width:100px;backdrop-filter:blur(4px); }
.hud-stage { font-size:14px;font-weight:900;color:#ffd700; }
.hud-level { font-size:11px;color:rgba(200,200,220,0.6);margin-top:1px; }
.hp-wrap { display:flex;align-items:center;gap:6px;margin-top:4px; }
.hp-bar { flex:1;height:5px;border-radius:999px;background:rgba(233,69,96,0.2);overflow:hidden; }
.hp-fill { height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:999px;transition:width 0.2s; }
.hp-num { font-size:10px;color:rgba(200,200,220,0.7);min-width:25px;text-align:right; }

/* Skill Bar - top-right */
#skillBar { position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;pointer-events:auto;max-height:60vh;overflow-y:auto; }
.skill-btn { display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(30,30,60,0.85);border:1px solid rgba(100,100,180,0.2);border-radius:10px;cursor:pointer;transition:all 0.12s;min-width:120px;backdrop-filter:blur(4px); }
.skill-btn:active { transform:scale(0.96);opacity:0.8; }
.skill-btn.on-cd { opacity:0.45;filter:grayscale(0.5); }
.sk-icon { font-size:18px;min-width:24px;text-align:center; }
.sk-info { flex:1;min-width:0; }
.sk-name { font-size:11px;font-weight:700;color:#d0d0e8;white-space:nowrap; }
.sk-cd { font-size:10px;color:#ff6b6b;font-weight:700; }
.sk-empty { font-size:11px;color:rgba(200,200,220,0.4);padding:8px;text-align:center;font-style:italic; }

/* Status message */
#statusMsg { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:900;color:#ffd700;pointer-events:none;opacity:0;transition:opacity 0.3s;text-shadow:0 2px 16px rgba(0,0,0,0.9);white-space:nowrap;z-index:10; }
#statusMsg.show { opacity:1; }

/* Card Draw Overlay */
.card-overlay { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;background:rgba(0,0,0,0.75);z-index:20;backdrop-filter:blur(6px); }
.card-overlay.hidden { display:none; }
.card-title { font-size:20px;font-weight:900;color:#ffd700;margin-bottom:16px;text-shadow:0 0 16px rgba(255,215,0,0.4); }
.card-grid { display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 10px; }
.card-item { width:min(110px,28vw);padding:14px 8px;background:rgba(30,30,60,0.9);border:2px solid rgba(123,104,238,0.4);border-radius:14px;text-align:center;cursor:pointer;transition:all 0.15s; }
.card-item:active { transform:scale(0.95);border-color:#ffd700;background:rgba(50,30,80,0.9); }
.card-icon { font-size:32px;margin-bottom:6px; }
.card-name { font-size:12px;font-weight:700;color:#e0e0f0;margin-bottom:4px; }
.card-desc { font-size:10px;color:rgba(200,200,220,0.6);line-height:1.3; }

/* Game Over */
.gameover-overlay { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:auto;background:rgba(0,0,0,0.78);z-index:20;backdrop-filter:blur(6px); }
.gameover-overlay.hidden { display:none; }
.go-box { padding:24px 32px;background:rgba(20,20,50,0.92);border:2px solid rgba(200,50,50,0.4);border-radius:18px;text-align:center; }
.go-box h2 { font-size:24px;color:#e94560;margin-bottom:14px;text-shadow:0 0 20px rgba(233,69,96,0.4); }
.go-stat { font-size:14px;color:rgba(200,200,220,0.7);margin:4px 0; }
.go-btn { margin-top:16px;padding:12px 36px;border:0;border-radius:12px;background:linear-gradient(180deg,#e94560,#b8304f);color:#fff;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:1px; }

/* Stage Complete */
.stage-overlay { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:auto;background:rgba(0,0,0,0.75);z-index:20;backdrop-filter:blur(6px); }
.stage-overlay.hidden { display:none; }
.st-box { padding:24px 32px;background:rgba(20,30,20,0.92);border:2px solid rgba(100,200,100,0.4);border-radius:18px;text-align:center; }
.st-box h2 { font-size:24px;color:#4f8c48;margin-bottom:14px;text-shadow:0 0 20px rgba(79,140,72,0.4); }
.st-stat { font-size:14px;color:rgba(200,220,200,0.7);margin:4px 0; }
.st-btn { margin-top:16px;padding:12px 36px;border:0;border-radius:12px;background:linear-gradient(180deg,#4f8c48,#3a6e35);color:#fff;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:1px; }

@media (max-width:380px) {
  .card-item { width:28vw;padding:10px 4px; }
  .card-icon { font-size:26px; }
  .skill-btn { min-width:100px;padding:5px 8px; }
  .sk-icon { font-size:15px; }
  .sk-name { font-size:10px; }
  #hud { padding:6px 8px; }
  .hud-stage { font-size:12px; }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="ui-layer">
  <div id="hud"></div>
  <div id="skillBar"></div>
  <div id="statusMsg"></div>
</div>
<script src="lib/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
