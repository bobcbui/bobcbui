<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Babylon FPS Arena</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #07111f;
			--panel: rgba(8, 15, 28, 0.72);
			--text: #edf4ff;
			--muted: #9eb3d4;
			--accent: #7cf7d4;
			--danger: #ff6a6a;
			--warning: #ffd56a;
		}

		html, body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background:
				radial-gradient(circle at top, rgba(61, 110, 184, 0.45), transparent 40%),
				radial-gradient(circle at bottom, rgba(124, 247, 212, 0.12), transparent 35%),
				var(--bg);
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
		}

		#gameCanvas {
			width: 100%;
			height: 100%;
			display: block;
			touch-action: none;
			cursor: crosshair;
		}

		#hud {
			position: fixed;
			inset: 0;
			pointer-events: none;
			color: var(--text);
		}

		.panel {
			position: absolute;
			top: 16px;
			left: 16px;
			padding: 12px 14px;
			background: var(--panel);
			border: 1px solid rgba(124, 247, 212, 0.2);
			border-radius: 14px;
			backdrop-filter: blur(12px);
			box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
			min-width: 220px;
		}

		.panel h1 {
			margin: 0 0 8px;
			font-size: 18px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.row {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			font-size: 14px;
			line-height: 1.5;
			color: var(--muted);
		}

		.row strong {
			color: var(--text);
			font-weight: 700;
		}

		#centerHint {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
			padding: 16px 20px;
			background: rgba(5, 10, 18, 0.6);
			border: 1px solid rgba(124, 247, 212, 0.18);
			border-radius: 18px;
			color: var(--text);
			max-width: 360px;
			transition: opacity 0.2s ease, transform 0.2s ease;
		}

		#centerHint.hidden {
			opacity: 0;
			transform: translate(-50%, -50%) scale(0.98);
		}

		#crosshair {
			position: absolute;
			left: 50%;
			top: 50%;
			width: 18px;
			height: 18px;
			transform: translate(-50%, -50%);
			opacity: 0.9;
		}

		#crosshair::before,
		#crosshair::after {
			content: "";
			position: absolute;
			left: 50%;
			top: 50%;
			background: rgba(237, 244, 255, 0.9);
			box-shadow: 0 0 10px rgba(124, 247, 212, 0.7);
			transform: translate(-50%, -50%);
		}

		#crosshair::before {
			width: 18px;
			height: 2px;
		}

		#crosshair::after {
			width: 2px;
			height: 18px;
		}

		#status {
			position: absolute;
			right: 16px;
			top: 16px;
			padding: 12px 14px;
			border-radius: 14px;
			background: var(--panel);
			border: 1px solid rgba(124, 247, 212, 0.2);
			min-width: 180px;
			text-align: right;
		}

		#status .title {
			color: var(--accent);
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-size: 12px;
			margin-bottom: 6px;
		}

		#status .big {
			font-size: 26px;
			font-weight: 800;
			line-height: 1;
		}

		#message {
			position: absolute;
			left: 50%;
			bottom: 20px;
			transform: translateX(-50%);
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(7, 17, 31, 0.7);
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: var(--muted);
			font-size: 13px;
			letter-spacing: 0.02em;
		}

		#message strong { color: var(--text); }
	</style>
</head>
<body>
	<canvas id="gameCanvas"></canvas>
	<div id="hud">
			<div class="panel">
				<h1>Babylon FPS</h1>
				<div class="row"><span>生命</span><strong id="healthText">100</strong></div>
				<div class="row"><span>弹药</span><strong id="ammoText">30 / 30</strong></div>
				<div class="row"><span>击杀</span><strong id="scoreText">0</strong></div>
				<div class="row"><span>波次</span><strong id="waveText">1</strong></div>
				<div class="row"><span>引擎</span><strong id="runtimeText">WebGL / Disabled</strong></div>
			</div>

		<div id="status">
			<div class="title">目标</div>
			<div class="big" id="enemyCount">0</div>
		</div>

		<div id="centerHint">
			点击屏幕进入战场，使用 WASD 移动，鼠标瞄准，左键射击，R 装弹。
		</div>

		<div id="crosshair"></div>
		<div id="message">提示：优先击倒靠近你的敌人</div>
	</div>

		<script src="lib/babylon.js"></script>
		<script src="lib/babylon.gui.min.js"></script>
		<script src="lib/babylonjs.loaders.min.js"></script>
		<script type="module" src="src/main.js"></script>
</body>
</html>
