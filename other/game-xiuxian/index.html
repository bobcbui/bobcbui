<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九天仙途 - 文字修仙世界</title>
<style>
:root {
  --panel-bg: rgba(6, 10, 20, 0.88);
  --panel-border: rgba(255,255,255,0.10);
  --text: #e8edf5;
  --text-dim: rgba(232,237,245,0.6);
  --gold: #ffd866;
  --hp: #ff6a5f;
  --qi: #65c8ff;
  --xp: #6de27a;
  --rare: #b388ff;
    --btn: linear-gradient(180deg,#9ee0ff,#6dbef1);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%;height:100%;overflow:hidden;background:#060d16;color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif;user-select:none; }
#gameCanvas { position:fixed;inset:0;display:block;touch-action:none;background:#0a1320; }
.ui-layer { position:fixed;inset:0;pointer-events:none; }
.panel { background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:12px;backdrop-filter:blur(12px); }
.hidden { display:none!important; }

/* Top HUD */
#hud { position:absolute;top:10px;left:10px;width:240px;padding:12px; }
#hud .realm { font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px; }
#hud .realm-sub { font-size:11px;color:var(--text-dim);margin-bottom:6px; }
#hud .bar-wrap { display:flex;align-items:center;gap:6px;margin-bottom:4px; }
#hud .bar-wrap .label { font-size:11px;width:20px;text-align:right; }
#hud .bar-bg { flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden; }
#hud .bar-fill { height:100%;width:100%;transition:width .1s linear;border-radius:999px; }
#hud .bar-text { font-size:10px;min-width:58px;text-align:right;color:var(--text-dim); }

/* Cultivation orb */
#cult-orb { position:absolute;top:50%;left:50%;width:80px;height:80px;transform:translate(-50%,-50%);pointer-events:none;border-radius:50%;opacity:0;transition:opacity .3s; }
#cult-orb.show { opacity:1; }

/* Zone label */
#zone-label { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;pointer-events:none;opacity:0;transition:opacity .6s;text-shadow:0 0 30px rgba(0,0,0,.8);letter-spacing:4px; }
#zone-label.show { opacity:.3; }

/* Bottom hotbar */
#hotbar { position:absolute;left:50%;bottom:10px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(8,minmax(48px,72px));gap:5px;width:min(calc(100vw - 16px),620px);justify-content:center; }
.slot { padding:5px 4px 6px;border:1px solid rgba(255,255,255,0.08);background:rgba(7,10,18,0.7);border-radius:8px;text-align:center;transition:.12s;pointer-events:auto;cursor:pointer; }
.slot:hover { border-color:rgba(255,255,255,0.2); }
.slot.active { transform:translateY(-4px);border-color:var(--gold);background:rgba(40,30,10,0.7); }
.slot .k { font-size:10px;color:var(--text-dim); }
.slot .n { font-size:12px;font-weight:700;margin:2px 0; }
.slot .m { font-size:10px;color:var(--text-dim);min-height:15px; }
.slot.cd .m { color:var(--hp); }
.slot.no-qi .m { color:var(--qi); }

/* Status msg */
#status { position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s;text-shadow:0 0 12px rgba(0,0,0,.9);white-space:nowrap; }
#status.show { opacity:1; }

/* Modal - Character */
.modal-overlay { position:absolute;inset:0;pointer-events:none;z-index:10; }
.modal-overlay.show { pointer-events:auto; }
.modal-overlay>.bg { position:absolute;inset:0;background:rgba(0,0,0,.5); }
.modal-box { position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(520px,calc(100vw - 24px));max-height:calc(100vh - 40px);overflow-y:auto;padding:16px;pointer-events:auto; }
.modal-box h2 { font-size:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center; }
.modal-box h2 .close { cursor:pointer;font-size:22px;color:var(--text-dim);padding:0 6px; }
.modal-box h2 .close:hover { color:var(--text); }

.modal-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px; }
.eq-slot { padding:10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06); }
.eq-slot .lbl { font-size:11px;color:var(--text-dim);margin-bottom:4px; }
.eq-slot .val { font-size:13px; }
.eq-slot .empty { color:var(--text-dim);font-style:italic;font-size:12px; }

.inv-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;max-height:200px;overflow-y:auto; }
.inv-item { padding:6px 4px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);text-align:center;cursor:pointer;font-size:11px;pointer-events:auto; }
.inv-item .in { font-weight:700; }
.inv-item .im { font-size:10px;color:var(--text-dim); }
.inv-item.equipped { border-color:var(--gold); }

.rarity-common { color:#aab; }
.rarity-uncommon { color:#6de27a; }
.rarity-rare { color:#65c8ff; }
.rarity-epic { color:#b388ff; }
.rarity-legendary { color:#ffd866; }
.rarity-mythic { color:#ff6a5f; }

/* Buttons */
.btn { pointer-events:auto;border:0;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:#060d16;background:var(--btn);cursor:pointer;display:inline-flex;align-items:center;gap:6px; }
.btn-sm { padding:5px 10px;font-size:12px;border-radius:8px; }
.btn-sec { background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text); }
.btn-gold { background:linear-gradient(180deg,#ffd866,#f0b800);color:#1a1200; }

.flex { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
.flex-between { display:flex;justify-content:space-between;align-items:center; }
.mt8 { margin-top:8px; }
.mb8 { margin-bottom:8px; }
.gap4 { gap:4px; }

/* Breakthrough */
#breakthrough-overlay { position:absolute;inset:0;z-index:20;pointer-events:none; }
#breakthrough-overlay.show { pointer-events:auto; }
#breakthrough-overlay .bg { position:absolute;inset:0;background:rgba(0,0,0,.7); }
#breakthrough-box { position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(400px,calc(100vw - 24px));padding:24px;text-align:center;pointer-events:auto; }
#breakthrough-box h2 { font-size:22px;margin-bottom:8px; }
#breakthrough-box p { font-size:14px;color:var(--text-dim);margin-bottom:16px; }
#breakthrough-box .chance { font-size:28px;font-weight:900;margin-bottom:12px; }

/* Loot popup */
#loot-popup { position:absolute;bottom:90px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;pointer-events:none;font-size:13px;opacity:0;transition:opacity .3s;white-space:nowrap; }
#loot-popup.show { opacity:1; }

/* Mini-particles */
.particle { position:fixed;pointer-events:none;border-radius:50%; }

@media(max-width:500px) {
  #hud { width:180px;padding:8px; }
  #hud .bar-text { font-size:9px;min-width:45px; }
  #hotbar { grid-template-columns:repeat(8,minmax(36px,1fr));gap:3px; }
  .slot .n { font-size:10px; }
  .slot .k,.slot .m { font-size:9px; }
}
</style>
<script src="lib/phaser.min.js"></script>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
  <!-- HUD -->
  <div id="hud" class="panel">
    <div class="flex-between">
      <div><span class="realm" id="realmText">凡体</span><span class="realm-sub" id="realmStageText">初期</span></div>
      <div><span class="realm-sub" id="levelText">Lv.1</span></div>
    </div>
    <div class="bar-wrap"><span class="label" style="color:var(--hp)">●</span><div class="bar-bg"><div id="hpFill" class="bar-fill" style="background:linear-gradient(90deg,var(--hp),#ffb164)"></div></div><span class="bar-text" id="hpText">100/100</span></div>
    <div class="bar-wrap"><span class="label" style="color:var(--qi)">◆</span><div class="bar-bg"><div id="qiFill" class="bar-fill" style="background:linear-gradient(90deg,var(--qi),#9be9ff)"></div></div><span class="bar-text" id="qiText">50/50</span></div>
    <div class="bar-wrap"><span class="label" style="color:var(--xp)">★</span><div class="bar-bg"><div id="xpFill" class="bar-fill" style="background:linear-gradient(90deg,var(--xp),#9effa0)"></div></div><span class="bar-text" id="xpText">0/10</span></div>
    <div class="flex-between mt8" style="font-size:11px;color:var(--text-dim);">
      <span>灵石 <strong id="moneyText" style="color:var(--gold)">0</strong></span>
      <span>杀敌 <strong id="killText">0</strong></span>
    </div>
  </div>

  <!-- Zone label -->
  <div id="zone-label">灵溪村</div>

  <!-- Status -->
  <div id="status">消息</div>

  <!-- Loot popup -->
  <div id="loot-popup" class="panel"></div>

  <!-- Hotbar -->
  <div id="hotbar"></div>

  <!-- Character Panel -->
  <div id="charPanel" class="modal-overlay hidden">
    <div class="bg" onclick="toggleCharPanel()"></div>
    <div class="modal-box panel">
      <h2><span>📜 角色面板</span><span class="close" onclick="toggleCharPanel()">✕</span></h2>
      <div class="modal-grid">
        <div class="eq-slot"><div class="lbl">境界</div><div class="val" id="cpRealm">凡体</div></div>
        <div class="eq-slot"><div class="lbl">等级</div><div class="val" id="cpLevel">1</div></div>
        <div class="eq-slot"><div class="lbl">攻击</div><div class="val" id="cpAtk">10</div></div>
        <div class="eq-slot"><div class="lbl">防御</div><div class="val" id="cpDef">5</div></div>
        <div class="eq-slot"><div class="lbl">生命</div><div class="val" id="cpHP">100</div></div>
        <div class="eq-slot"><div class="lbl">灵力</div><div class="val" id="cpQi">50</div></div>
      </div>
      <h3 style="font-size:14px;margin-bottom:6px;">⚔️ 装备</h3>
      <div class="modal-grid" id="eqGrid">
        <div class="eq-slot" data-slot="weapon"><div class="lbl">武器</div><div class="val empty" id="eq-weapon">空</div></div>
        <div class="eq-slot" data-slot="helmet"><div class="lbl">头盔</div><div class="val empty" id="eq-helmet">空</div></div>
        <div class="eq-slot" data-slot="armor"><div class="lbl">衣服</div><div class="val empty" id="eq-armor">空</div></div>
        <div class="eq-slot" data-slot="boots"><div class="lbl">鞋子</div><div class="val empty" id="eq-boots">空</div></div>
        <div class="eq-slot" data-slot="ring"><div class="lbl">戒指</div><div class="val empty" id="eq-ring">空</div></div>
        <div class="eq-slot" data-slot="amulet"><div class="lbl">项链</div><div class="val empty" id="eq-amulet">空</div></div>
      </div>
      <h3 style="font-size:14px;margin-bottom:6px;">🎒 背包 (<span id="invCount">0</span>/30)</h3>
      <div class="inv-grid" id="invGrid"></div>
      <div class="flex mt8">
        <button class="btn btn-sm btn-sec" onclick="toggleCharPanel()">关闭</button>
      </div>
    </div>
  </div>

  <!-- Breakthrough modal -->
  <div id="breakthrough-overlay">
    <div class="bg" onclick="cancelBreakthrough()"></div>
    <div id="breakthrough-box" class="panel hidden">
      <h2 id="btTitle">突破!</h2>
      <p id="btDesc">准备迎接天劫</p>
      <div class="chance" id="btChance">90%</div>
      <div class="flex" style="justify-content:center;">
        <button class="btn btn-gold" id="btBtn" onclick="doBreakthrough()">突破!</button>
        <button class="btn btn-sec" onclick="cancelBreakthrough()">再等等</button>
      </div>
    </div>
  </div>

  <!-- Death modal -->
  <div id="deathModal" class="modal-overlay hidden">
    <div class="bg"></div>
    <div class="modal-box panel" style="text-align:center;max-width:320px;">
      <h2 style="color:var(--hp);justify-content:center;">💀 道殒</h2>
      <p style="color:var(--text-dim);margin-bottom:16px;">修行之路多坎坷，重整旗鼓再战！</p>
      <button class="btn btn-gold" id="respawnBtn">重生</button>
    </div>
  </div>

  <!-- Save notification -->
  <div id="damageFlash" style="position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;background:radial-gradient(circle,rgba(255,90,90,0)0%,rgba(255,90,90,0.12)50%,rgba(255,50,50,0.35)100%);z-index:3;"></div>
  <div id="saveNotif" style="position:absolute;top:10px;right:10px;font-size:12px;color:var(--text-dim);pointer-events:none;opacity:0;transition:.3s;">已存档</div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
