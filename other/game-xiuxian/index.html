<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九天仙途 - 剑气长城</title>
<style>
:root {
  --panel-bg: rgba(30, 20, 10, 0.94);
  --panel-border: rgba(200, 160, 80, 0.25);
  --text: #e8d5b0;
  --gold: #ffd700;
  --hp: #ff6a5f;
  --btn: linear-gradient(180deg,#f6dfac,#d9a64f);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%;height:100%;overflow:hidden;background:#1a0a00;color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif;user-select:none; }
#gameCanvas { position:fixed;inset:0;display:block;touch-action:none;background:#1a0a00; }
.ui-layer { position:fixed;inset:0;pointer-events:none; }
.hidden { display:none!important; }

/* Right Control Panel */
#ctrl-panel { position:absolute; right:0; top:0; bottom:0; width:200px; pointer-events:auto; display:flex; flex-direction:column; z-index:15; }
#ctrl-tabs { display:flex; flex-direction:column; padding:8px 6px; gap:4px; }
#ctrl-tabs button { padding:10px 6px; border:1px solid rgba(200,160,80,0.2); border-radius:8px; background:rgba(40,28,12,0.85); color:#c8a860; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
#ctrl-tabs button:hover { border-color:var(--gold); color:var(--gold); background:rgba(60,40,16,0.9); }
#ctrl-tabs button.active { border-color:var(--gold); color:var(--gold); background:rgba(80,50,20,0.95); box-shadow:0 0 8px rgba(255,215,0,0.15); }

#ctrl-content { flex:1; overflow-y:auto; padding:8px; }
#ctrl-content .panel { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:12px; padding:12px; }
#ctrl-content h3 { font-size:14px; color:var(--gold); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid rgba(200,160,80,0.2); }

.eq-slot { padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.05); border:1px solid rgba(200,160,80,0.12); margin-bottom:5px; font-size:11px; }
.eq-slot .lbl { color:rgba(200,160,80,0.6); font-size:10px; }
.eq-slot .val { color:#e8d5b0; }
.eq-slot .empty { color:rgba(200,160,80,0.3); font-style:italic; }

.inv-item { padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.05); border:1px solid rgba(200,160,80,0.12); margin-bottom:4px; cursor:pointer; font-size:11px; }
.inv-item:hover { border-color:var(--gold); }
.inv-item .in { font-weight:700; color:#e8d5b0; }
.inv-item .im { font-size:10px; color:rgba(200,160,80,0.5); }
.inv-item .is { font-size:10px; color:rgba(200,160,80,0.5); }
.inv-item.equipped { border-color:var(--gold); }

.skill-row { padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.04); margin-bottom:4px; font-size:12px; }
.skill-row .sn { font-weight:700; color:var(--gold); }
.skill-row .sd { font-size:10px; color:rgba(200,160,80,0.5); }

.shop-row { padding:8px; border-radius:6px; background:rgba(255,255,255,0.04); border:1px solid rgba(200,160,80,0.1); margin-bottom:4px; }
.shop-row .sh-name { font-size:12px; font-weight:700; color:var(--gold); }
.shop-row .sh-desc { font-size:10px; color:rgba(200,160,80,0.5); margin:2px 0; }
.shop-row .sh-cost { font-size:11px; color:var(--gold); }

.ach-row { padding:6px 8px; border-radius:4px; margin-bottom:3px; font-size:11px; display:flex; align-items:center; gap:6px; }
.ach-row.done { color:#88cc88; }
.ach-row .ach-icon { font-size:14px; width:20px; text-align:center; }

.btn { pointer-events:auto; border:0; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; color:#3f2d1d; background:var(--btn); cursor:pointer; }
.btn-sm { padding:4px 8px; font-size:10px; }
.btn-gold { background:linear-gradient(180deg,#f7d98e,#d19a38); color:#3f2d1d; }

/* Top-right skill bar */
#hotbar { position:absolute; top:10px; right:210px; display:flex; flex-direction:column; gap:5px; z-index:8; pointer-events:auto; }
.slot { width:48px; padding:5px 2px; border:1px solid rgba(200,160,80,0.2); background:rgba(30,20,10,0.85); border-radius:8px; text-align:center; transition:.12s; cursor:pointer; }
.slot:hover { border-color:var(--gold); }
.slot.active { transform:translateX(-6px); border-color:var(--gold); background:rgba(80,50,20,0.9); }
.slot .n { font-size:16px; font-weight:900; color:#e8d5b0; margin:1px 0; }
.slot .m { font-size:9px; color:rgba(200,160,80,0.5); min-height:12px; }
.slot.cd .m { color:var(--hp); }

/* Status */
#status { display:none!important; position:absolute; bottom:70px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:600; color:var(--gold); pointer-events:none; opacity:0; transition:opacity .2s; text-shadow:0 2px 12px rgba(0,0,0,.8); white-space:nowrap; }
#status.show { opacity:1; }

/* Modals */
.modal-overlay { position:absolute; inset:0; pointer-events:none; z-index:20; }
.modal-overlay>.bg { position:absolute; inset:0; background:rgba(0,0,0,.5); }
.modal-box { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(360px,calc(100vw - 24px)); padding:20px; pointer-events:auto; background:rgba(30,20,10,0.95); border:1px solid var(--panel-border); border-radius:14px; text-align:center; }
.modal-box h2 { font-size:18px; margin-bottom:12px; }

/* Breakthrough */
#breakthrough-overlay { position:absolute; inset:0; z-index:25; pointer-events:none; }
#breakthrough-overlay.show { pointer-events:auto; }
#breakthrough-overlay .bg { position:absolute; inset:0; background:rgba(0,0,0,.4); }
#breakthrough-box { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(360px,calc(100vw - 24px)); padding:24px; text-align:center; pointer-events:auto; background:rgba(30,20,10,0.95); border:1px solid var(--panel-border); border-radius:14px; }
#breakthrough-box h2 { font-size:22px; color:var(--gold); margin-bottom:8px; }
#breakthrough-box p { font-size:14px; color:rgba(200,160,80,0.6); margin-bottom:16px; }
#breakthrough-box .chance { font-size:28px; font-weight:900; color:var(--gold); margin-bottom:12px; }

.flex { display:flex; gap:8px; align-items:center; justify-content:center; }

/* Joystick */
#joystick-zone { display:none; position:absolute; bottom:80px; left:50%; transform:translateX(-50%); width:130px; height:130px; pointer-events:auto; touch-action:none; z-index:5; border-radius:50%; border:2px solid rgba(200,160,80,0.15); background:rgba(255,250,232,0.04); }
@media (max-width:768px) {
  body.has-touch #joystick-zone { display:block; }
  #status { bottom:128px; font-size:12px; }
  #joystick-zone { left:24%; bottom:78px; }
  #ctrl-panel { width:160px; }
  #hotbar { right:168px; }
  .slot { width:40px; }
}
#joystick-zone.active { border-color:rgba(200,160,80,0.3); background:rgba(255,250,232,0.1); }
#joystick-thumb { position:absolute; top:50%; left:50%; width:54px; height:54px; border-radius:50%; background:rgba(240,210,140,0.3); border:2px solid rgba(200,160,80,0.3); transform:translate(-50%,-50%); pointer-events:none; }

#damageFlash { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .2s; background:radial-gradient(circle,rgba(185,74,62,0)0%,rgba(185,74,62,0.10)55%,rgba(185,74,62,0.24)100%); z-index:3; }
#saveNotif { position:absolute; top:60px; right:18px; font-size:12px; color:var(--text); pointer-events:none; opacity:0; transition:.3s; }

</style>
<script src="lib/phaser.min.js"></script>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
  <!-- Control Panel (right side) -->
  <div id="ctrl-panel">
    <div id="ctrl-tabs">
      <button onclick="switchPanelTab('equip')" id="tab-equip" class="active">⚔️ 装备</button>
      <button onclick="switchPanelTab('skill')" id="tab-skill">📖 技能</button>
      <button onclick="switchPanelTab('shop')" id="tab-shop">🏪 商城</button>
      <button onclick="switchPanelTab('activity')" id="tab-activity">🎯 活动</button>
    </div>
    <div id="ctrl-content">
      <div id="panel-equip" class="panel"></div>
      <div id="panel-skill" class="panel hidden"></div>
      <div id="panel-shop" class="panel hidden"></div>
      <div id="panel-activity" class="panel hidden"></div>
    </div>
  </div>

  <!-- Skill Bar -->
  <div id="hotbar"></div>

  <!-- Status -->
  <div id="status">消息</div>

  <div id="joystick-zone"><div id="joystick-thumb"></div></div>

  <!-- Breakthrough -->
  <div id="breakthrough-overlay">
    <div class="bg" onclick="cancelBreakthrough()"></div>
    <div id="breakthrough-box" class="hidden">
      <h2 id="btTitle">突破!</h2>
      <p id="btDesc">准备迎接天劫</p>
      <div class="chance" id="btChance">90%</div>
      <div class="flex">
        <button class="btn btn-gold" id="btBtn" onclick="doBreakthrough()">突破!</button>
        <button class="btn" onclick="cancelBreakthrough()">再等等</button>
      </div>
    </div>
  </div>

  <!-- Death modal -->
  <div id="deathModal" class="modal-overlay hidden">
    <div class="bg"></div>
    <div class="modal-box">
      <h2 style="color:var(--hp);">💀 道殒</h2>
      <p style="color:rgba(200,160,80,0.6);margin-bottom:16px;">修行之路多坎坷，重整旗鼓再战！</p>
      <button class="btn btn-gold" id="respawnBtn">重生</button>
    </div>
  </div>

  <div id="damageFlash"></div>
  <div id="saveNotif">已存档</div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
