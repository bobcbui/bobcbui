<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九天仙途 - 剑气长城</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%;height:100%;overflow:hidden;font-family:"Segoe UI","Microsoft YaHei",sans-serif;user-select:none; }
:root {
  --bg: #ededed;
  --bg-dark: #1a1a1a;
  --gold: #d4a017;
  --green: #07c160;
  --red: #e64340;
  --text: #191919;
  --text2: #888;
  --tab-height: 56px;
  --header-height: 44px;
}

#gameCanvas {
  position:fixed;inset:0;display:block;touch-action:none;background:#efe3c0;z-index:1;
}
#gameCanvas.hidden { display:none; }

/* Menu Overlay */
#menu-overlay {
  position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);
}
#menu-overlay.hidden { display:none; }

#menu-header {
  height:var(--header-height);display:flex;align-items:center;justify-content:center;
  background:#fff;border-bottom:1px solid #e5e5e5;font-size:17px;font-weight:700;
  flex-shrink:0;
}

#menu-content {
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
}

#menu-tabs {
  height:var(--tab-height);display:flex;border-top:1px solid #e5e5e5;background:#f7f7f7;
  flex-shrink:0;
}
#menu-tabs .tab {
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;color:var(--text2);cursor:pointer;gap:2px;
}
#menu-tabs .tab.active { color:var(--green); }
#menu-tabs .tab .tab-icon { font-size:22px;line-height:1; }

/* Tab content */
.tab-content { display:none;padding:12px; }
.tab-content.active { display:block; }

/* Level List (关卡) */
.level-item {
  display:flex;align-items:center;padding:14px 16px;background:#fff;
  border-bottom:1px solid #f0f0f0;cursor:pointer;gap:12px;
}
.level-item:active { background:#ececec; }
.level-item .lv-icon { font-size:32px;width:44px;text-align:center;flex-shrink:0; }
.level-item .lv-info { flex:1;min-width:0; }
.level-item .lv-name { font-size:16px;margin-bottom:3px; }
.level-item .lv-desc { font-size:12px;color:var(--text2); }
.level-item .lv-status { flex-shrink:0; }
.level-item .lv-arrow { color:#c7c7cc;font-size:14px; }
.level-item .lv-lock { color:var(--text2);font-size:12px; }
.level-item .lv-done { color:var(--green);font-size:16px; }
.level-item.locked { opacity:0.5; }

/* 我的 tab */
.profile-section {
  background:#fff;border-radius:8px;margin-bottom:10px;padding:14px;
}
.profile-section .ps-title { font-size:12px;color:var(--text2);margin-bottom:8px; }
.profile-row { display:flex;justify-content:space-between;padding:6px 0;font-size:14px; }
.profile-row .pr-val { color:var(--gold);font-weight:600; }
.profile-avatar { width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#d4a017,#f0c040);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px; }

/* 背包 tab */
.bag-header { font-size:13px;color:var(--text2);padding:4px 0 8px; }
.bag-item {
  display:flex;align-items:center;padding:10px 14px;background:#fff;
  border-bottom:1px solid #f0f0f0;font-size:13px;gap:10px;cursor:pointer;
}
.bag-item:active { background:#ececec; }
.bag-item .bi-icon { font-size:20px;width:32px;text-align:center; }
.bag-item .bi-info { flex:1; }
.bag-item .bi-name { font-weight:600; }
.bag-item .bi-stats { font-size:11px;color:var(--text2); }
.bag-item .bi-action { font-size:12px;color:var(--green); }

/* 技能 tab */
.skill-item {
  padding:12px 16px;background:#fff;border-bottom:1px solid #f0f0f0;
}
.skill-item .si-name { font-size:15px;font-weight:600;margin-bottom:3px; }
.skill-item .si-info { font-size:12px;color:var(--text2); }

/* Chat-style 关卡 list */
.chat-header { padding:10px 16px;font-size:13px;color:var(--text2);background:var(--bg); }

.btn-green {
  background:var(--green);color:#fff;border:0;border-radius:4px;
  padding:6px 14px;font-size:13px;cursor:pointer;
}
.btn-outline { background:#fff;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer; }

/* Status */
#status { position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:600;color:#fff;z-index:50;pointer-events:none;opacity:0;transition:opacity .2s;text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap; }
#status.show { opacity:1; }

/* Battle UI (in-game) */
#battle-ui { position:fixed;inset:0;z-index:5;pointer-events:none;display:none; }
#battle-ui.show { display:block; }

#hotbar { position:absolute; top:10px; right:10px; display:flex; flex-direction:column; gap:5px; pointer-events:auto; }
.slot { width:48px;padding:6px 2px;border:1px solid rgba(200,160,80,0.3);background:rgba(30,20,10,0.7);border-radius:8px;text-align:center;cursor:pointer; }
.slot:hover { border-color:var(--gold); }
.slot.active { transform:translateX(-6px);border-color:var(--gold);background:rgba(80,50,20,0.85); }
.slot .n { font-size:16px;font-weight:900;color:#e8d5b0;margin:1px 0; }
.slot .m { font-size:9px;color:rgba(200,160,80,0.5);min-height:12px; }
.slot.cd .m { color:var(--red); }

#joystick-zone { display:none;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:130px;height:130px;pointer-events:auto;touch-action:none;z-index:5;border-radius:50%;border:2px solid rgba(200,160,80,0.15);background:rgba(0,0,0,0.1); }
@media (max-width:768px) { body.has-touch #joystick-zone { display:block; } }
#joystick-zone.active { border-color:var(--gold);background:rgba(0,0,0,0.2); }
#joystick-thumb { position:absolute;top:50%;left:50%;width:54px;height:54px;border-radius:50%;background:rgba(240,210,140,0.3);border:2px solid rgba(200,160,80,0.3);transform:translate(-50%,-50%);pointer-events:none; }

/* Modals */
.modal-overlay { position:fixed;inset:0;z-index:30;pointer-events:none; }
.modal-overlay.show { pointer-events:auto; }
.modal-overlay .bg { position:absolute;inset:0;background:rgba(0,0,0,.5); }
.modal-box { position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(340px,85vw);padding:24px;pointer-events:auto;background:#fff;border-radius:14px;text-align:center; }
.modal-box h2 { font-size:18px;margin-bottom:12px; }
.modal-box p { font-size:14px;color:var(--text2);margin-bottom:16px; }

#damageFlash { position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;background:radial-gradient(circle,rgba(230,67,64,0)0%,rgba(230,67,64,0.1)55%,rgba(230,67,64,0.2)100%);z-index:4; }

.flex { display:flex;gap:10px;justify-content:center;align-items:center; }

@media (max-width:500px) {
  #joystick-zone { bottom:72px;width:105px;height:105px; }
  #joystick-thumb { width:44px;height:44px; }
}
</style>
<script src="lib/phaser.min.js"></script>
</head>
<body>
<canvas id="gameCanvas" class="hidden"></canvas>

<!-- ====== Main Menu (WeChat layout) ====== -->
<div id="menu-overlay">
  <div id="menu-header">九天仙途</div>

  <div id="menu-content">
    <!-- 关卡 Tab -->
    <div id="tab-levels" class="tab-content active"></div>
    <!-- 背包 Tab -->
    <div id="tab-bag" class="tab-content"></div>
    <!-- 技能 Tab -->
    <div id="tab-skills" class="tab-content"></div>
    <!-- 我的 Tab -->
    <div id="tab-me" class="tab-content"></div>
  </div>

  <div id="menu-tabs">
    <div class="tab active" data-tab="levels">
      <span class="tab-icon">⚔️</span>关卡
    </div>
    <div class="tab" data-tab="bag">
      <span class="tab-icon">🎒</span>背包
    </div>
    <div class="tab" data-tab="skills">
      <span class="tab-icon">📖</span>技能
    </div>
    <div class="tab" data-tab="me">
      <span class="tab-icon">👤</span>我的
    </div>
  </div>
</div>

<!-- ====== Battle UI ====== -->
<div id="battle-ui">
  <div id="hotbar"></div>
  <div id="joystick-zone"><div id="joystick-thumb"></div></div>
</div>

<div id="status">消息</div>
<div id="damageFlash"></div>

<!-- Breakthrough -->
<div id="breakthrough-overlay" class="modal-overlay hidden">
  <div class="bg" onclick="cancelBreakthrough()"></div>
  <div class="modal-box">
    <h2 id="btTitle" style="color:var(--gold)">突破!</h2>
    <p id="btDesc">准备迎接天劫</p>
    <div id="btChance" style="font-size:28px;font-weight:900;color:var(--gold);margin-bottom:12px;">90%</div>
    <div class="flex">
      <button class="btn-green" id="btBtn" onclick="doBreakthrough()">突破!</button>
      <button style="background:#f0f0f0;color:var(--text);border:0;border-radius:4px;padding:8px 14px;font-size:13px;cursor:pointer;" onclick="cancelBreakthrough()">再等等</button>
    </div>
  </div>
</div>

<!-- Death modal -->
<div id="deathModal" class="modal-overlay hidden">
  <div class="bg"></div>
  <div class="modal-box">
    <h2 style="color:var(--red)">💀 道殒</h2>
    <p>修行之路多坎坷，重整旗鼓再战！</p>
    <button class="btn-green" id="respawnBtn">重生</button>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
